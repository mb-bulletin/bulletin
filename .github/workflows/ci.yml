name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Run tests on every push/PR. Build & push the Docker image only on
# tagged releases (v0.2.0, etc.). Production deploys pull the tagged
# image; trunk pushes don't automatically deploy.

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: |
          # Run every test suite, fail the build if any fails.
          for f in tests/test_*.py; do
              echo "=== $f ==="
              PYTHONPATH=. python "$f"
          done

  mobile-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile_app/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: pwa-dist
          path: mobile_app/dist
          retention-days: 14

  docker-image:
    needs: [python-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/bulletin-parser:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}/bulletin-parser:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
